<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book of Mormon Tab</title>
    <meta name="description"
        content="A tab that allows users to enter their favorite Book of Mormon chapters and display them in a list that updates automatically on the screen.">
    <meta name="author" content="Jonathan Cajoy">
    <link href="styles/bom.css" rel="stylesheet">
    <script src="scripts/bom.js" defer></script>
</head>

<body>
    <h1>📖 Book of Mormon - Top 10</h1>
    <main>
        <label for="favchap">Enter Book and Chapter: </label>
        <input type="text" id="favchap" placeholder="Alma 5">
        <button type="submit">Add Chapter</button>
        <ul id="list"></ul>
    </main>
</body>

</html>
